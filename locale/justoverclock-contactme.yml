    pText: "<p>Bằng cách điền vào biểu mẫu liên hệ này, bạn có thể gửi cho chúng tôi các đề nghị thương mại, hợp tác hoặc đơn giản là bất kỳ câu hỏi nào; chúng tôi sẽ trả lời trong vòng tối đa 7 ngày.</p>\n<p><strong>XỬ LÝ DỮ LIỆU CÁ NHÂN</strong></p>\n<p>(Chính sách bảo mật, điều 13 d.lgs. 196/2003)</p>\n<p>Chúng tôi xin thông báo rằng dữ liệu bạn cung cấp cho người vận hành trang web này khi điền vào \"biểu mẫu liên hệ\" (còn gọi là form mail) sẽ được xử lý theo quy định của Nghị định 196/2003, Bộ luật về bảo vệ dữ liệu cá nhân.\n   Biểu mẫu liên hệ trên trang web chỉ nhằm mục đích cho phép khách truy cập, nếu muốn, liên hệ với người quản lý trang web bằng cách gửi email qua biểu mẫu nói trên.\n   Thông tin này liên quan đến dữ liệu cá nhân do khách truy cập gửi khi điền vào biểu mẫu liên hệ.</p>\n<p>Vui lòng tuân thủ các quy tắc sau:</p>\n<li>Không lạm dụng biểu mẫu liên hệ cho những yêu cầu có thể đặt ra trên diễn đàn</li>\n<li>Không gửi cùng một email nhiều lần</li>\n"
