        enableFilter: 'Bật bộ lọc query-string/API'
        enableFilterDescription: "Cho phép liên kết sâu (deep-link) bộ lọc phân loại đến thảo luận, người dùng và sản phẩm cho những người dùng có quyền \"xem tất cả\" của loại phân loại đó. Điều này cũng cho phép những người dùng này sử dụng bộ lọc tìm kiếm qua REST API. Nếu không bật cài đặt \"Hiển thị bộ lọc\", người dùng không có cách rõ ràng nào để lấy những liên kết đó cho người dùng và sản phẩm. Đối với thảo luận, liên kết sâu vẫn có thể được tìm thấy trong phần hero ngay cả khi \"Hiển thị bộ lọc\" bị tắt.\n"
        enableFulltextSearch: 'Lập chỉ mục thuật ngữ cho tìm kiếm toàn văn'
        enableFulltextSearchDescription: "Chỉ có hiệu lực khi tích hợp Scout đang hoạt động. Tên các thuật ngữ sẽ trở thành một phần dữ liệu có thể tìm kiếm toàn văn đối với người dùng thông thường. Dữ liệu sẽ có thể được tìm kiếm bởi bất kỳ người dùng nào có quyền xem danh sách tài nguyên (\"Xem diễn đàn\" cho thảo luận, \"Tìm kiếm người dùng\" cho người dùng và mọi người đối với sản phẩm), chứ không phải những người dùng có quyền xem phân loại! Bạn phải tự xây dựng lại chỉ mục tìm kiếm Scout cho tài nguyên sau khi thay đổi cài đặt này đối với các phân loại hiện có, và tương tự nếu bạn xóa phân loại trong khi các thuật ngữ vẫn đang được gán.\n"
        enableFulltextSearchWarning: "Quyền tìm kiếm tài nguyên (\"Xem diễn đàn\" cho thảo luận, \"Tìm kiếm người dùng\" cho người dùng) của bạn khác với quyền \"xem tất cả\" của Phân loại. Trước khi bật tùy chọn này, hãy chắc chắn rằng bạn chấp nhận để những người dùng đó tìm kiếm được dữ liệu này, ngay cả khi bình thường họ có thể không xem được các phân loại!\n"
